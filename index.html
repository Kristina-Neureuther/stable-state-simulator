<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #020203;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>An exploration of Emergent Systems. The simulation transitions from high entropy (chaos) to a fluid macro-structure, ultimately locking into a permanent geometric attractor state.</p>
    
    <canvas id="swarmCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');

        const numBoids = 150;
        const boids = [];

        // 1. Die mathematischen Ziel-Punkte für das Herz berechnen
        function createHeartNodes(count) {
            const nodes = [];
            const cx = 850 / 2;
            const cy = 500 / 2 - 20; // Etwas nach oben verschoben, damit es zentriert wirkt
            const scale = 12; // Größe des Herzens

            for (let i = 0; i < count; i++) {
                let t = (i / count) * Math.PI * 2;
                
                // Klassische Herz-Gleichung
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                nodes.push({
                    x: cx + x * scale,
                    y: cy - y * scale 
                });
            }
            return nodes;
        }

        const targets = createHeartNodes(numBoids);

        // 2. Punkte (Boids) erstellen
        for (let i = 0; i < numBoids; i++) {
            boids.push({
                x: Math.random() * 850,
                y: Math.random() * 500,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                hue: Math.floor(Math.random() * 360), // Jeder Punkt ist bunt
                target: targets[i] // Jeder Punkt merkt sich seinen festen Platz im Herz
            });
        }

        // Hilfsfunktion: Geschwindigkeitslimit
        function limitSpeed(p, max) {
            let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (speed > max && speed > 0) {
                p.vx = (p.vx / speed) * max;
                p.vy = (p.vy / speed) * max;
            }
        }

        // Hilfsfunktion: An den Rändern abprallen
        function bounce(p) {
            if (p.x < 20) p.vx += 0.5;
            if (p.x > 830) p.vx -= 0.5;
            if (p.y < 20) p.vy += 0.5;
            if (p.y > 480) p.vy -= 0.5;
        }

        let frameCount = 0;

        // 3. Animations-Schleife
        function animate() {
            // Reines Schwarz, damit die Farben leuchten und nichts schmiert
            ctx.fillStyle = '#020203';
            ctx.fillRect(0, 0, 850, 500);

            frameCount++;

            for (let i = 0; i < boids.length; i++) {
                let p = boids[i];

                // === PHASE 1: CHAOS (Frame 0 bis 150) ===
                if (frameCount < 150) {
                    p.vx += (Math.random() - 0.5) * 1;
                    p.vy += (Math.random() - 0.5) * 1;
                    limitSpeed(p, 3);
                    bounce(p);
                } 
                // === PHASE 2: SCHWARM (Frame 150 bis 350) ===
                else if (frameCount < 350) {
                    let cx = 0, cy = 0, vx = 0, vy = 0, count = 0;
                    
                    for (let j = 0; j < boids.length; j++) {
                        if (i === j) continue;
                        let other = boids[j];
                        let distSq = (p.x - other.x) * (p.x - other.x) + (p.y - other.y) * (p.y - other.y);
                        
                        if (distSq < 3600) { // Sichtweite
                            cx += other.x; cy += other.y;
                            vx += other.vx; vy += other.vy;
                            count++;
                            
                            // Platz machen (Kollisionen vermeiden)
                            if (distSq < 400) {
                                p.vx += (p.x - other.x) * 0.01;
                                p.vy += (p.y - other.y) * 0.01;
                            }
                        }
                    }
                    
                    // Zusammenfinden und in die gleiche Richtung fliegen
                    if (count > 0) {
                        cx /= count; cy /= count; vx /= count; vy /= count;
                        p.vx += (cx - p.x) * 0.01;
                        p.vy += (vx - p.vx) * 0.05;
                    }
                    limitSpeed(p, 2.5);
                    bounce(p);
                } 
                // === PHASE 3: DAS HERZ (Ab Frame 350) ===
                else {
                    // Feder-Physik: Zieht die Punkte exakt auf ihren Platz
                    let dx = p.target.x - p.x;
                    let dy = p.target.y - p.y;
                    
                    p.vx += dx * 0.03; // Anziehungskraft
                    p.vy += dy * 0.03;
                    
                    // Reibung: Bremst die Punkte ab, damit sie still stehen bleiben
                    p.vx *= 0.82; 
                    p.vy *= 0.82;
                }

                // Position aktualisieren
                p.x += p.vx;
                p.y += p.vy;

                // Punkt zeichnen
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${p.hue}, 100%, 60%)`;
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
