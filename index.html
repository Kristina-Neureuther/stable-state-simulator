<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #020203;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>An exploration of Emergent Systems. The simulation transitions from high entropy (chaos) to a fluid macro-structure, ultimately converging into a globally recognized geometric attractor state.</p>
    
    <canvas id="swarmCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');

        const boids = [];
        const numBoids = 150;

        const visualRange = 60;
        const speedLimit = 2.0;

        // Fehlerfreie, mathematisch sichere Herz-Berechnung
        function createHeartNodes(numNodes) {
            const targets = [];
            const cx = 850 / 2;
            const cy = 500 / 2 - 15; 
            const scale = 11; 

            for (let i = 0; i < numNodes; i++) {
                let t = (i / numNodes) * Math.PI * 2;
                let sinT = Math.sin(t);
                
                // Simpler und browser-kompatibler als Math.pow
                let x = 16 * sinT * sinT * sinT;
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                targets.push({
                    x: cx + x * scale,
                    y: cy - y * scale 
                });
            }
            return targets;
        }

        const heartNodes = createHeartNodes(numBoids);

        class Boid {
            constructor(targetNode) {
                this.x = Math.random() * 850;
                this.y = Math.random() * 500;
                this.dx = (Math.random() - 0.5) * 4; 
                this.dy = (Math.random() - 0.5) * 4;
                
                this.hue = Math.floor(Math.random() * 360);
                this.target = targetNode; 
            }

            distance(other) {
                return Math.sqrt((this.x - other.x) ** 2 + (this.y - other.y) ** 2);
            }

            flyTowardsCenter(boids, swarmFactor) {
                let centerX = 0; let centerY = 0; let numNeighbors = 0;
                for (let other of boids) {
                    if (this.distance(other) < visualRange) {
                        centerX += other.x; centerY += other.y; numNeighbors += 1;
                    }
                }
                if (numNeighbors) {
                    centerX = centerX / numNeighbors; centerY = centerY / numNeighbors;
                    this.dx += (centerX - this.x) * 0.005 * swarmFactor;
                    this.dy += (centerY - this.y) * 0.005 * swarmFactor;
                }
            }

            avoidOthers(boids) {
                let moveX = 0; let moveY = 0;
                for (let other of boids) {
                    if (other !== this && this.distance(other) < 15) {
                        moveX += this.x - other.x; moveY += this.y - other.y;
                    }
                }
                this.dx += moveX * 0.05;
                this.dy += moveY * 0.05;
            }

            matchVelocity(boids, swarmFactor) {
                let avgDX = 0; let avgDY = 0; let numNeighbors = 0;
                for (let other of boids) {
                    if (this.distance(other) < visualRange) {
                        avgDX += other.dx; avgDY += other.dy; numNeighbors += 1;
                    }
                }
                if (numNeighbors) {
                    avgDX = avgDX / numNeighbors; avgDY = avgDY / numNeighbors;
                    this.dx += (avgDX - this.dx) * 0.05 * swarmFactor;
                    this.dy += (avgDY - this.dy) * 0.05 * swarmFactor;
                }
            }

            convergeToHeart(heartFactor) {
                this.dx += (this.target.x - this.x) * 0.02 * heartFactor;
                this.dy += (this.target.y - this.y) * 0.02 * heartFactor;
            }

            limitSpeed(heartFactor) {
                const currentLimit = speedLimit - (heartFactor * 1.5);
                const speed = Math.sqrt(this.dx * this.dx + this.dy * this.dy);
                
                // Failsafe: Verhindert Division durch Null
                if (speed > currentLimit && currentLimit > 0 && speed !== 0) {
                    this.dx = (this.dx / speed) * currentLimit;
                    this.dy = (this.dy / speed) * currentLimit;
                }
            }

            keepWithinBounds() {
                const margin = 50; const turnFactor = 0.1; 
                if (this.x < margin) this.dx += turnFactor;
                if (this.x > 850 - margin) this.dx -= turnFactor;
                if (this.y < margin) this.dy += turnFactor;
                if (this.y > 500 - margin) this.dy -= turnFactor;
            }

            update(boids, swarmFactor, heartFactor) {
                if (swarmFactor < 1 && heartFactor === 0) {
                    this.dx += (Math.random() - 0.5) * 0.5 * (1 - swarmFactor);
                    this.dy += (Math.random() - 0.5) * 0.5 * (1 - swarmFactor);
                }

                this.flyTowardsCenter(boids, swarmFactor);
                this.avoidOthers(boids);
                this.matchVelocity(boids, swarmFactor);
                
                if (heartFactor > 0) {
                    this.convergeToHeart(heartFactor);
                }

                this.limitSpeed(heartFactor);
                this.keepWithinBounds();
                
                // Absolute Sicherheit: Falls sich doch ein NaN einschleicht, wird der Punkt gerettet
                if (isNaN(this.dx)) this.dx = 0;
                if (isNaN(this.dy)) this.dy = 0;

                this.x += this.dx;
                this.y += this.dy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.fill();
            }
        }

        // System initiieren
        for (let i = 0; i < numBoids; i++) {
            boids.push(new Boid(heartNodes[i]));
        }

        let frameCount = 0;

        function animate() {
            ctx.fillStyle = '#020203';
            ctx.fillRect(0, 0, 850, 500);

            frameCount++;

            let swarmFactor = 0;
            let heartFactor = 0;

            if (frameCount > 150) {
                swarmFactor = Math.min(1, (frameCount - 150) / 100);
            }
            if (frameCount > 350) {
                heartFactor = Math.min(1, (frameCount - 350) / 150);
                swarmFactor = Math.max(0, 1 - heartFactor);
            }

            for (let boid of boids) {
                boid.update(boids, swarmFactor, heartFactor);
                boid.draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
