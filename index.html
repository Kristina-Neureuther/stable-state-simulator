        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');

        // Die unsichtbare Matrix für das Peace-Zeichen
        function createAttractorNodes() {
            const targets = [];
            const cx = 850 / 2; // Exakte Canvas-Mitte
            const cy = 500 / 2;
            const R = 130; 

            // Äußerer Kreis
            for(let i=0; i<80; i++) {
                let a = (i/80) * Math.PI * 2;
                targets.push({x: cx + R*Math.cos(a), y: cy + R*Math.sin(a)});
            }
            // Vertikale Mittellinie
            for(let i=0; i<30; i++) {
                targets.push({x: cx, y: cy - R + (i/29)*2*R});
            }
            // Linke Diagonale
            for(let i=0; i<20; i++) {
                targets.push({x: cx - (i/19)*R*0.707, y: cy + (i/19)*R*0.707});
            }
            // Rechte Diagonale
            for(let i=0; i<20; i++) {
                targets.push({x: cx + (i/19)*R*0.707, y: cy + (i/19)*R*0.707});
            }
            return targets;
