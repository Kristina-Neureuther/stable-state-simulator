<html lang="en">
<head>

    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 650px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #020203;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>An exploration of Directed Emergence. Autonomous agents utilize localized feedback loops to self-organize. Eventually, the systemic gravity pulls the swarm into a globally recognized geometric attractor state of equilibrium.</p>
    
    <canvas id="c" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        
        // 1. Die Zielkoordinaten für das Peace-Zeichen berechnen
        const targets = [];
        const cx = 425; // Mitte von 850
        const cy = 250; // Mitte von 500
        const R = 130;  // Radius

        // Kreis außen (60 Punkte)
        for(let i=0; i<60; i++) {
            targets.push({
                x: cx + R * Math.cos((i/60) * Math.PI * 2), 
                y: cy + R * Math.sin((i/60) * Math.PI * 2)
            });
        }
        // Linie Mitte (25 Punkte)
        for(let i=0; i<25; i++) {
            targets.push({x: cx, y: cy - R + (i/24) * 2 * R});
        }
        // Diagonale links (15 Punkte)
        for(let i=0; i<15; i++) {
            targets.push({x: cx - (i/14) * R * 0.707, y: cy + (i/14) * R * 0.707});
        }
        // Diagonale rechts (15 Punkte)
        for(let i=0; i<15; i++) {
            targets.push({x: cx + (i/14) * R * 0.707, y: cy + (i/14) * R * 0.707});
        }

        // 2. Die fliegenden Punkte (Boids) erstellen
        const boids = [];
        for(let i=0; i<targets.length; i++) {
            boids.push({
                x: Math.random() * 850,
                y: Math.random() * 500,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                tx: targets[i].x,  // Jeder Punkt merkt sich sein Ziel im Peace-Zeichen
                ty: targets[i].y
            });
        }

        let frame = 0;

        // 3. Die Animations-Schleife
        function draw() {
            frame++;
            
            // Hintergrund mit leichtem Schweif-Effekt zeichnen
            ctx.fillStyle = 'rgba(2, 2, 3, 0.3)';
            ctx.fillRect(0, 0, 850, 500);

            // Ab Frame 100 (ca. 2 Sekunden) fängt das Peace-Zeichen an zu ziehen
            let force = 0;
            if (frame > 100) {
                force = (frame - 100) * 0.0002;
                if (force > 0.03) force = 0.03; // Sogkraft begrenzen, damit es geschmeidig bleibt
            }

            ctx.fillStyle = '#00d2ff'; // Leuchtendes Cyan

            // Jeden Punkt bewegen und zeichnen
            for(let i=0; i<boids.length; i++) {
                let p = boids[i];

                    // Zum Ziel ziehen
                    p.vx += (p.tx - p.x) * force;
                    p.vy += (p.ty - p.y) * force;
