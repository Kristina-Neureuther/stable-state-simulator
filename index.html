<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #020203;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>An exploration of Emergent Systems. Autonomous agents utilize localized feedback loops (alignment, cohesion, separation) to self-organize from chaos into a highly resilient, fluid macro-structure.</p>
    
    <canvas id="swarmCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');

        const boids = [];
        const numBoids = 150;

        // System Parameters for Stable Equilibrium (Deutlich verlangsamt)
        const visualRange = 60;
        const speedLimit = 1.2; // Halbe Maximalgeschwindigkeit für elegante Bewegungen

        class Boid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Sanfterer Start
                this.dx = (Math.random() - 0.5) * 1; 
                this.dy = (Math.random() - 0.5) * 1;
            }

            distance(other) {
                return Math.sqrt((this.x - other.x) ** 2 + (this.y - other.y) ** 2);
            }

            flyTowardsCenter(boids) {
                let centerX = 0; let centerY = 0; let numNeighbors = 0;
                for (let other of boids) {
                    if (this.distance(other) < visualRange) {
                        centerX += other.x; centerY += other.y; numNeighbors += 1;
                    }
                }
                if (numNeighbors) {
                    centerX = centerX / numNeighbors; centerY = centerY / numNeighbors;
                    this.dx += (centerX - this.x) * 0.005;
                    this.dy += (centerY - this.y) * 0.005;
                }
            }

            avoidOthers(boids) {
                let moveX = 0; let moveY = 0;
                for (let other of boids) {
                    if (other !== this && this.distance(other) < 20) {
                        moveX += this.x - other.x; moveY += this.y - other.y;
                    }
                }
                this.dx += moveX * 0.05;
                this.dy += moveY * 0.05;
            }

            matchVelocity(boids) {
                let avgDX = 0; let avgDY = 0; let numNeighbors = 0;
                for (let other of boids) {
                    if (this.distance(other) < visualRange) {
                        avgDX += other.dx; avgDY += other.dy; numNeighbors += 1;
                    }
                }
                if (numNeighbors) {
                    avgDX = avgDX / numNeighbors; avgDY = avgDY / numNeighbors;
                    this.dx += (avgDX - this.dx) * 0.05;
                    this.dy += (avgDY - this.dy) * 0.05;
                }
            }

            limitSpeed() {
                const speed = Math.sqrt(this.dx * this.dx + this.dy * this.dy);
                if (speed > speedLimit) {
                    this.dx = (this.dx / speed) * speedLimit;
                    this.dy = (this.dy / speed) * speedLimit;
                }
            }

            keepWithinBounds() {
                const margin = 50; const turnFactor = 0.05; // Weicheres Abprallen am Rand
                if (this.x < margin) this.dx += turnFactor;
                if (this.x > canvas.width - margin) this.dx -= turnFactor;
                if (this.y < margin) this.dy += turnFactor;
                if (this.y > canvas.height - margin) this.dy -= turnFactor;
            }

            update(boids) {
                this.flyTowardsCenter(boids);
                this.avoidOthers(boids);
                this.matchVelocity(boids);
                this.limitSpeed();
                this.keepWithinBounds();
                this.x += this.dx;
                this.y += this.dy;
            }

            draw() {
                // Farb-Verlauf basierend auf der Position (Blau zu Cyan/Teal)
                const hue = (this.x / canvas.width) * 60 + 180; 

                ctx.beginPath();
                // Zeichnet perfekte Kreise (Punkte) statt Pfeile
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                
                // Sanftes Leuchten hinzufügen
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.shadowBlur = 6;
                ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
                
                ctx.fill();
                
                // Schatten für den nächsten Frame zurücksetzen (wichtig für die Performance)
                ctx.shadowBlur = 0;
            }
        }

        // Initialize Swarm
        for (let i = 0; i < numBoids; i++) {
            boids.push(new Boid());
        }

        function animate() {
            // Motion Trail Effekt: Macht die langsame Bewegung noch fließender
            ctx.fillStyle = 'rgba(2, 2, 3, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let boid of boids) {
                boid.update(boids);
                boid.draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
