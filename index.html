<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #08080a;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 5px; 
            font-size: 1.6em;
            color: #ffffff;
        }
        p { 
            color: #52525b; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 550px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background: #010102;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>A systemic design model. Isolated components drift in high entropy. Through continuous interaction, proximity, and structural symbiosis, the network self-organizes into a resilient, dynamic equilibrium.</p>
    
    <canvas id="stableCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('stableCanvas');
        const ctx = canvas.getContext('2d');

        const particles = [];
        const numParticles = 90; // Weniger Punkte für ein ruhigeres Gesamtbild
        const connectionDist = 110; 

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Extrem verlangsamte Bewegung für einen eleganten Fluss (Zeitlupe)
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.baseHue = Math.random() * 360;
                this.hue = this.baseHue;
                this.radius = 2.5;
                this.synergy = 0; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                this.synergy = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + (this.synergy * 1.5), 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 85%, 60%)`;
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        function simulateNetwork() {
            // Solides Löschen des Hintergrunds verhindert jegliches Hektik-Flackern
            ctx.fillStyle = '#010102';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                let p1 = particles[i];

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];

                    let dx = p1.x - p2.x;
