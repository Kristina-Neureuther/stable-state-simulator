<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stable State Simulator</title>
    <style>
        body {
            background-color: #050507;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.6em;
            color: #ffffff;
            text-transform: uppercase;
        }
        p { 
            color: #6b7280; 
            margin-bottom: 30px; 
            font-size: 0.85em; 
            text-align: center; 
            max-width: 600px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #020203;
        }
    </style>
</head>
<body>

    <h1>STABLE STATE SIMULATOR</h1>
    <p>An exploration of Emergent Systems. The simulation transitions from high entropy (chaos) to a fluid macro-structure, ultimately locking into a permanent geometric attractor state.</p>
    
    <canvas id="swarmCanvas" width="850" height="500"></canvas>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');

        const numBoids = 400; 
        const boids = [];

        function createFilledHeartNodes(count) {
            const nodes = [];
            const cx = 850 / 2;
            const cy = 500 / 2 - 20; 
            const scale = 12; 

            for (let i = 0; i < count; i++) {
                let t = Math.random() * Math.PI * 2;
                let fillFactor = Math.sqrt(Math.random());
                
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                nodes.push({
                    x: cx + (x * fillFactor) * scale,
                    y: cy - (y * fillFactor) * scale 
                });
            }
            return nodes;
        }

        const targets = createFilledHeartNodes(numBoids);

        for (let i = 0; i < numBoids; i++) {
            boids.push({
                x: Math.random() * 850,
                y: Math.random() * 500,
                // Extrem verlangsamte Startgeschwindigkeit
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                hue: Math.floor(Math.random() * 360), 
                target: targets[i] 
            });
        }

        function limitSpeed(p, max) {
            let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (speed > max && speed > 0) {
                p.vx = (p.vx / speed) * max;
                p.vy = (p.vy / speed) * max;
            }
        }

        function bounce(p) {
            if (p.x < 20) p.vx += 0.5;
            if (p.x > 830) p.vx -= 0.5;
            if (p.y < 20) p.vy += 0.5;
            if (p.y > 480) p.vy -= 0.5;
        }

        let frameCount = 0;

        function animate() {
            ctx.fillStyle = '#020203';
            ctx.fillRect(0, 0, 850, 500);

            frameCount++;

            for (let i = 0; i < boids.length; i++) {
                let p = boids[i];

                // === PHASE 1: CHAOS ===
                if (frameCount < 150) {
                    // Kaum noch zusätzliche Beschleunigung pro Frame
                    p.vx += (Math.random() - 0.5) * 0.3;
                    p.vy += (Math.random() - 0.5) * 0.3;
                    limitSpeed(p, 1.2); // Radikal reduziertes Tempolimit
                    bounce(p);
                } 
                // === PHASE 2: SCHWARM ===
                else if (frameCount < 350) {
                    let cx = 0, cy = 0, vx = 0, vy = 0, count = 0;
                    
                    for (let j = 0; j < boids.length; j++) {
                        if (i === j) continue;
                        let other = boids[j];
                        let distSq = (p.x - other.x) * (p.x - other.x) + (p.y - other.y) * (p.y - other.y);
                        
                        if (distSq < 3600) { 
                            cx += other.x; cy += other.y;
                            vx += other.vx; vy += other.vy;
                            count++;
                            
                            if (distSq < 400) {
                                p.vx += (p.x - other.x) * 0.005;
                                p.vy += (p.y - other.y) * 0.005;
                            }
                        }
                    }
                    
                    if (count > 0) {
                        cx /= count; cy /= count; vx /= count; vy /= count;
                        // Anziehungskräfte im Schwarm halbiert
                        p.vx += (cx - p.x) * 0.005;
                        p.vy += (vx - p.vx) * 0.02;
                    }
                    limitSpeed(p, 1.0); // Schwarm bewegt sich generell langsamer
                    bounce(p);
                } 
                // === PHASE 3: DAS HERZ ===
                else {
                    let framesInHeartPhase = frameCount - 350;
                    
                    let dx = p.target.x - p.x;
                    let dy = p.target.y - p.y;
                    
                    // Magnet zieht viel sanfter an (Maximalwert von 0.01 auf 0.003 reduziert)
                    let pull = Math.min(0.003, framesInHeartPhase * 0.00002);
                    p.vx += dx * pull; 
                    p.vy += dy * pull;
                    
                    // Reibung greift weicher
                    let friction = Math.max(0.92, 1 - (framesInHeartPhase * 0.0002));
                    p.vx *= friction; 
                    p.vy *= friction;

                    limitSpeed(p, 1.2); // Absolutes Limit auch während der Herz-Zusammensetzung

                    if (framesInHeartPhase < 150) {
                        bounce(p);
                    }
                }

                p.x += p.vx;
                p.y += p.vy;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${p.hue}, 100%, 60%)`;
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
