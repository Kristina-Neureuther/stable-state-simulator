        const canvas = document.getElementById('stableCanvas');
        const ctx = canvas.getContext('2d');

        const particles = [];
        const numParticles = 80; 
        const connectionDist = 120; 

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Elegant slow motion vector movement
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.baseHue = Math.floor(Math.random() * 360);
                this.hue = this.baseHue;
                this.radius = 3;
                this.synergy = 0; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                this.synergy = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + (this.synergy * 2), 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${Math.floor(this.hue)}, 85%, 60%)`;
                ctx.fill();
            }
        }

            particles.push(new Particle());
        }
