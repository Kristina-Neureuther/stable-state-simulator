        function createHeartNodes(numNodes) {
            const targets = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 - 15; // Leicht nach oben verschoben für bessere Optik
            const scale = 11; // Größe des Herzens

            for (let i = 0; i < numNodes; i++) {
                // T läuft von 0 bis 2*Pi
                let t = (i / numNodes) * Math.PI * 2;
                
                // Parametrische Gleichung für ein Herz
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                targets.push({
                    x: cx + x * scale,
                    y: cy - y * scale // Minus, weil der Canvas auf der Y-Achse nach unten läuft
                });
            }
            return targets;
        }

                this.y = Math.random() * canvas.height;

                this.dy = (Math.random() - 0.5) * 4;
                
                this.hue = Math.floor(Math.random() * 360);
                this.target = targetNode; // Jeder Punkt kennt seinen Platz im Herz
            }

                return Math.sqrt((this.x - other.x) ** 2 + (this.y - other.y) ** 2);
            }

                for (let other of boids) {

                        centerX += other.x; centerY += other.y; numNeighbors += 1;
                    }
                }
                if (numNeighbors) {
                    centerX = centerX / numNeighbors; centerY = centerY / numNeighbors;

                    this.dy += (centerY - this.y) * 0.005 * swarmFactor;
                }
            }

                this.dy += moveY * 0.05;
